services:
  db:
    image: postgres:15
    container_name: social-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bot_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bot_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
