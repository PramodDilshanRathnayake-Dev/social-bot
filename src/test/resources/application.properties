# Test-only configuration to avoid relying on a local PostgreSQL instance.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Provide dummy values so beans can initialize without real secrets.
spring.ai.openai.api-key=dummy
whatsapp.meta.verify-token=test
whatsapp.meta.access-token=test
whatsapp.meta.phone-number-id=test
whatsapp.meta.api-url=https://graph.facebook.com/v25.0

# Default Whatzzi settings for tests
whatzzi.admin-number=+94717465220
whatzzi.hi-reply=Hello! How can we help you with a WhatsApp chatbot today?

